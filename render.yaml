services:
  - type: web
    name: fde-toolkit
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./dashboard/Dockerfile.website
    dockerContext: .
    healthCheckPath: /
    autoDeployTrigger: commit
    domains:
      - fde-toolkit.com
    envVars:
      - key: FDE_DEMO_ENABLED
        value: "true"
      - key: FDE_DEMO_KEEP_WORKSPACES
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: INTEREST_NOTIFICATION_EMAIL
        value: amitvik@gmail.com
      - key: INTEREST_FROM_EMAIL
        value: FDE-Toolkit <onboarding@resend.dev>
