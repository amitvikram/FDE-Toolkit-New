name: Platform CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SITE_ONLY: "true"
      FDE_DEMO_ENABLED: "true"
      FDE_DEMO_KEEP_WORKSPACES: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Test persistent execution platform
        working-directory: execution-plane
        run: npm test

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build Next.js control plane
        working-directory: dashboard
        run: npm run build

      - name: Build Docker control and execution planes
        run: docker compose build

      - name: Start separated Docker product
        run: |
          docker compose up --detach

          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/orchestration/health > /tmp/fde-health.json; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs
          exit 1

      - name: Smoke test gated product workspace
        run: node dashboard/scripts/smoke-gated-product.mjs

      - name: Smoke test signed orchestration and provenance
        run: |
          curl --fail --silent --show-error \
            http://127.0.0.1:3000/api/orchestration/catalog \
            --output /tmp/fde-catalog.json

          for scenario in enterprise-ai saas-design-partner si-delivery; do
            curl --fail --silent --show-error \
              --request POST \
              --header 'Content-Type: application/json' \
              --data "{\
                \"scenario\":\"${scenario}\",\
                \"clientAsk\":\"Create a governed delivery workflow that preserves the client ask, observed evidence, and mandatory human approval before promotion.\",\
                \"repository\":\"https://github.com/customer/example-product\",\
                \"baseBranch\":\"main\",\
                \"codingAgentId\":\"fde-demo-agent\",\
                \"sandboxId\":\"local-ephemeral\",\
                \"sourceControlId\":\"promotion-package\",\
                \"approvalMode\":\"human-required\"\
              }" \
              http://127.0.0.1:3000/api/orchestration/run \
              --output "/tmp/fde-run-${scenario}.json"
          done

          node --input-type=module <<'NODE'
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";

          const health = JSON.parse(await readFile("/tmp/fde-health.json", "utf8"));
          const catalog = JSON.parse(await readFile("/tmp/fde-catalog.json", "utf8"));

          assert.equal(health.status, "connected");
          assert.equal(health.executionPlane.executionBoundary, "separate-container");
          assert.equal(health.executionPlane.trustModel, "observed-not-self-reported");
          assert.ok(catalog.catalog.codingAgents.some((provider) => provider.id === "fde-demo-agent"));

          for (const scenario of ["enterprise-ai", "saas-design-partner", "si-delivery"]) {
            const run = JSON.parse(await readFile(`/tmp/fde-run-${scenario}.json`, "utf8"));
            assert.match(run.result.runId, /^fde-/);
            assert.equal(run.result.executionBoundary, "separate-container");
            assert.equal(run.result.policyProfile.humanApprovalRequired, true);
            assert.equal(run.result.provenance.capturedBy, "fde-execution-plane");
            assert.equal(run.result.provenance.trustModel, "observed-not-self-reported");
            assert.equal(run.result.provenance.filesystemDiff.length, 5);
            assert.equal(run.result.provenance.commands[0].exitCode, 0);
            assert.equal(run.result.provenance.tests[0].passed, true);
            assert.equal(run.result.promotionPackage.changedFiles.length, 5);
            assert.ok(run.result.previewHtml.includes("Validation ready"));
          }
          NODE

      - name: Smoke test asynchronous jobs audit drivers and analytics
        run: |
          docker compose exec -T execution-plane node --input-type=module <<'NODE'
          import assert from "node:assert/strict";
          import { createHmac } from "node:crypto";

          const origin = "http://127.0.0.1:8787";
          const secret = "local-demo-signing-secret";
          async function signedPost(path, payload) {
            const body = JSON.stringify(payload);
            const timestamp = Date.now().toString();
            const signature = `sha256=${createHmac("sha256", secret).update(`${timestamp}.${body}`).digest("hex")}`;
            const response = await fetch(`${origin}${path}`, {
              method: "POST",
              headers: {
                "content-type": "application/json",
                "x-fde-timestamp": timestamp,
                "x-fde-signature": signature,
              },
              body,
            });
            const result = await response.json();
            assert.ok(response.ok, `${response.status}: ${JSON.stringify(result)}`);
            return result;
          }

          const health = await fetch(`${origin}/health`).then((response) => response.json());
          assert.equal(health.storage.type, "file");
          assert.ok(Array.isArray(health.sandboxDrivers));
          assert.ok(Array.isArray(health.secretProviders));

          const drivers = await fetch(`${origin}/v1/drivers`).then((response) => response.json());
          assert.ok(drivers.drivers.some((driver) => driver.id === "openai-codex"));
          assert.ok(drivers.drivers.some((driver) => driver.id === "claude-agent"));
          assert.ok(drivers.drivers.some((driver) => driver.id === "cursor-agent"));
          assert.ok(drivers.drivers.some((driver) => driver.id === "customer-agent-gateway"));

          const sandboxDrivers = await fetch(`${origin}/v1/sandboxes/drivers`).then((response) => response.json());
          assert.ok(sandboxDrivers.drivers.some((driver) => driver.id === "local-ephemeral"));
          assert.ok(sandboxDrivers.drivers.some((driver) => driver.id === "docker-local"));
          assert.ok(sandboxDrivers.drivers.some((driver) => driver.id === "kubernetes-job"));

          const secretProviders = await fetch(`${origin}/v1/secrets/providers`).then((response) => response.json());
          assert.ok(secretProviders.providers.some((provider) => provider.id === "env"));
          assert.ok(secretProviders.providers.some((provider) => provider.id === "vault"));
          assert.ok(secretProviders.providers.some((provider) => provider.id === "aws-sm"));
          assert.ok(secretProviders.providers.some((provider) => provider.id === "azure-kv"));

          const sandboxResponse = await signedPost("/v1/sandboxes", {
            tenantId: "ci-tenant",
            actor: { id: "ci-engineer", role: "engineer" },
            driverId: "local-ephemeral",
            timeoutSeconds: 60
          });
          assert.equal(sandboxResponse.sandbox.status, "ready");
          const sandboxId = sandboxResponse.sandbox.id;
          const sandbox = await fetch(`${origin}/v1/sandboxes/${sandboxId}`).then((response) => response.json());
          assert.equal(sandbox.sandbox.id, sandboxId);
          const destroyed = await signedPost(`/v1/sandboxes/${sandboxId}/destroy`, {
            tenantId: "ci-tenant",
            actor: { id: "ci-admin", role: "admin" }
          });
          assert.equal(destroyed.sandbox.status, "destroyed");

          const created = await signedPost("/v1/jobs", {
            tenantId: "ci-tenant",
            organizationId: "ci-tenant",
            actor: { id: "ci-engineer", role: "engineer" },
            scenario: "enterprise-ai",
            intent: "Create a governed delivery workflow with persistent evidence, approvals, and a reviewable promotion package.",
            driverId: "fde-demo-agent"
          });
          const jobId = created.job.id;
          let job;
          for (let attempt = 0; attempt < 100; attempt += 1) {
            job = await fetch(`${origin}/v1/jobs/${jobId}?tenantId=ci-tenant`).then((response) => response.json()).then((payload) => payload.job);
            if (["completed", "failed"].includes(job.status)) break;
            await new Promise((resolve) => setTimeout(resolve, 50));
          }
          assert.equal(job.status, "completed", job.error);
          assert.ok(job.request.requiredApprovals.length > 0);

          const audit = await fetch(`${origin}/v1/jobs/${jobId}/audit?tenantId=ci-tenant`).then((response) => response.json());
          assert.equal(audit.verified, true);
          assert.ok(audit.records.some((event) => event.type === "filesystem.diff"));
          assert.ok(audit.records.some((event) => event.type === "command.executed"));

          await signedPost(`/v1/jobs/${jobId}/evidence`, {
            tenantId: "ci-tenant",
            actor: { id: "ci", role: "system" },
            kind: "security-scan",
            source: "ci",
            status: "passed",
            summary: "CI security policy passed."
          });
          await signedPost("/v1/artifacts", {
            tenantId: "ci-tenant",
            actor: { id: "ci-engineer", role: "engineer" },
            name: "Governed workflow pattern",
            sourceJobId: jobId,
            tags: ["ci", "workflow"]
          });
          const analytics = await fetch(`${origin}/v1/analytics/ask-to-pr?tenantId=ci-tenant`, {
            headers: { "x-fde-actor-id": "ci-auditor", "x-fde-actor-role": "auditor" }
          }).then((response) => response.json());
          assert.equal(analytics.completed, 1);
          assert.ok(analytics.medianAskToCompletedMs >= 0);
          NODE

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs || true

      - name: Stop Docker product
        if: always()
        run: docker compose down --volumes --remove-orphans || true
