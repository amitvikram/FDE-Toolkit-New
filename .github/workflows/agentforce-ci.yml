name: Agentforce CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  agentforce-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_ONLY: "true"
      FDE_DEMO_ENABLED: "true"
      FDE_DEMO_KEEP_WORKSPACES: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Test Agentforce package builder
        working-directory: dashboard
        run: node scripts/test-agentforce-package.mjs

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build Agentforce control plane
        working-directory: dashboard
        run: npm run build
