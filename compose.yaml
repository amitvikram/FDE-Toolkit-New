services:
  execution-plane:
    build:
      context: .
      dockerfile: execution-plane/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "8787"
      FDE_EXECUTION_BOUNDARY: separate-container
      FDE_EXECUTION_SIGNING_SECRET: local-demo-signing-secret
      FDE_CALLBACK_SIGNING_SECRET: local-demo-callback-secret
      FDE_DEMO_KEEP_WORKSPACES: "false"
      FDE_DATA_DIR: /var/lib/fde
      FDE_WORKSPACE_ROOT: /workspaces
      FDE_MAX_CONCURRENT_JOBS: "2"
      FDE_MAX_CONCURRENT_JOBS_PER_TENANT: "1"
      FDE_MAX_QUEUED_JOBS: "100"
    volumes:
      - fde_execution_data:/var/lib/fde
      - fde_workspaces:/workspaces
    expose:
      - "8787"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 3s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  website:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.website
    depends_on:
      execution-plane:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_ONLY: "true"
      FDE_DEMO_ENABLED: "true"
      FDE_EMBEDDED_EXECUTION_PLANE: "false"
      FDE_EXECUTION_PLANE_URL: http://execution-plane:8787
      FDE_EXECUTION_SIGNING_SECRET: local-demo-signing-secret
      FDE_PRODUCT_ACCESS_SECRET: local-product-access-secret
      FDE_PRODUCT_ACCESS_ALLOW_UNDELIVERED: "true"
    restart: unless-stopped

volumes:
  fde_execution_data:
  fde_workspaces:
